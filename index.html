<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#4f46e5' } // Matching Indigo accent
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col items-center py-10 px-4">

<div class="w-full max-w-3xl text-center mb-10">
    <h1 class="text-4xl font-black text-gray-900 tracking-tight mb-2">⚡ AI Quiz Maker</h1>
    <p class="text-gray-500">Generate, Share, and Host live multiplayer quizzes.</p>
</div>

<div class="bg-white p-8 rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-gray-100 w-full max-w-lg transition-all duration-300" id="setup-section">
    <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Quiz Topic</label>
        <input type="text" id="topicInput" placeholder="e.g. World War 2, Python Basics, Anime" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all bg-gray-50 focus:bg-white text-gray-800">
    </div>
    
    <div class="mb-8">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Timer (Seconds)</label>
        <input type="number" id="timerInput" value="60" min="10" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all bg-gray-50 focus:bg-white text-gray-800">
    </div>

    <button id="generateBtn" onclick="generateQuiz()" class="w-full bg-primary hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all duration-200 shadow-md hover:shadow-lg active:scale-[0.98] flex items-center justify-center gap-2">
        <span>Generate Quiz Engine</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 1.414L10.586 9H7a1 1 0 100 2h3.586l-1.293 1.293a1 1 0 101.414 1.414l3-3a1 1 0 000-1.414z" clip-rule="evenodd" /></svg>
    </button>
</div>

<div id="host-view" class="w-full max-w-3xl hidden flex-col items-center">
    
    <div class="bg-white p-8 md:p-12 rounded-2xl shadow-[0_2px_15px_-3px_rgba(6,81,237,0.15)] border border-indigo-100 w-full mb-8 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary to-blue-400"></div>
        <p class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-2">Join Room PIN</p>
        <h2 id="pinDisplay" class="text-7xl md:text-8xl font-black text-gray-900 tracking-[0.15em]">----</h2>
        <p class="text-gray-500 mt-6 bg-gray-50 inline-block px-4 py-2 rounded-lg text-sm border border-gray-200">
            Tell your friends to join at: <span class="font-bold text-primary">rohan5809.github.io/AI_Quiz_Generator/contestant.html</span>
        </p>
    </div>

    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-gray-100 w-full">
        <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
            <h3 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
                📡 Live Match Feed
            </h3>
            <span class="flex items-center gap-2 text-sm font-semibold text-green-600 bg-green-50 px-3 py-1 rounded-full border border-green-200 animate-pulse">
                <span class="w-2 h-2 rounded-full bg-green-500"></span> Live
            </span>
        </div>
        <div id="host-leaderboard" class="space-y-3">
            <p class='text-center text-gray-500 py-10 font-medium'>Waiting for players to join and submit scores...</p>
        </div>
    </div>
</div>

<script>
    let hostWs;

    async function generateQuiz() {
        const topic = document.getElementById("topicInput").value.trim();
        const timer = document.getElementById("timerInput").value.trim();
        
        if(!topic) return alert("Please enter a topic!");
        
        const btn = document.getElementById("generateBtn");
        btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> AI is writing questions...`;
        btn.disabled = true;

        try {
            const response = await fetch("https://ai-quiz-generator-7eak.onrender.com/create-room", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ topic: topic, timer_value: parseInt(timer) || 60 })
            });

            const data = await response.json();
            
            if(data.status === "success") {
                // UI transition
                document.getElementById("setup-section").classList.add("hidden");
                document.getElementById("host-view").classList.remove("hidden");
                document.getElementById("host-view").classList.add("flex");
                
                // Set PIN
                document.getElementById("pinDisplay").innerText = data.room_pin;
                
                // Connect Host to WebSocket to receive live scores
                connectHostToRoom(data.room_pin);
            } else {
                alert("Failed to generate quiz. Try again.");
                resetButton(btn);
            }
        } catch(error) {
            alert("Error connecting to server!");
            console.error(error);
            resetButton(btn);
        }
    }

    function resetButton(btn) {
        btn.innerHTML = `<span>Generate Quiz Engine</span>`;
        btn.disabled = false;
    }

    // Host connects to the same room as a spectator to get leaderboard updates
    function connectHostToRoom(pin) {
        // We use "HOST_VIEWER" as the player name so backend doesn't crash, 
        // and it just receives broadcasted messages.
        hostWs = new WebSocket(`wss://ai-quiz-generator-7eak.onrender.com/ws/${pin}/HOST_VIEWER`);
        
        hostWs.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if(msg.type === "leaderboard") {
                renderHostLeaderboard(msg.data);
            }
        };
    }

    function renderHostLeaderboard(data) {
        let html = "";
        const sortedPlayers = Object.entries(data)
                                    .filter(([user, _]) => user !== "HOST_VIEWER") // Hide the host from the board
                                    .sort((a, b) => b[1] - a[1]);
        
        if (sortedPlayers.length === 0) {
            document.getElementById("host-leaderboard").innerHTML = "<p class='text-center text-gray-500 py-10 font-medium'>Waiting for players to submit scores...</p>";
            return;
        }

        sortedPlayers.forEach(([user, pts], index) => {
            let medal = "";
            if(index === 0) medal = "🏆";
            else if(index === 1) medal = "🥈";
            else if(index === 2) medal = "🥉";
            else medal = `<span class="text-gray-400 font-bold w-6 inline-block text-center">${index+1}</span>`;

            const bgClass = index === 0 ? "bg-indigo-50 border border-indigo-100" : "bg-white border border-gray-100";

            html += `
            <div class="flex justify-between items-center p-4 rounded-xl ${bgClass} shadow-sm transition-all">
                <div class="flex items-center gap-4">
                    <span class="text-2xl">${medal}</span>
                    <span class="font-bold text-gray-800 text-lg">${user}</span>
                </div>
                <span class="font-black text-primary bg-indigo-100 px-4 py-2 rounded-lg text-lg">${pts} <span class="text-xs font-semibold uppercase text-indigo-400">pts</span></span>
            </div>`;
        });
        document.getElementById("host-leaderboard").innerHTML = html;
    }
</script>
</body>
</html>
