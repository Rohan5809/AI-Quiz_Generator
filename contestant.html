<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join AI Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#4f46e5' } 
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .option-card:hover { border-color: #4f46e5; background-color: #eef2ff; }
        input[type="radio"]:checked + span { font-weight: 600; color: #4f46e5; }
        /* Progress bar ki smooth sliding animation ke liye */
        .timer-transition { transition: width 1s linear, background-color 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col items-center py-10 px-4">

<div class="bg-white p-8 rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-gray-100 w-full max-w-md text-center transition-all duration-300" id="join-section">
    <div class="mb-6">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">🎮 Join Quiz</h1>
        <p class="text-gray-500 text-sm">Enter your details to enter the room</p>
    </div>
    <input type="text" id="nameInput" placeholder="Your Name" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent mb-4 transition-all bg-gray-50 focus:bg-white text-left">
    <input type="text" id="pinInput" placeholder="PIN" maxlength="4" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent mb-6 transition-all bg-gray-50 focus:bg-white text-center tracking-[0.5em] font-bold text-xl uppercase">
    <button onclick="joinRoom()" class="w-full bg-primary hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-xl transition-all duration-200 shadow-md hover:shadow-lg active:scale-[0.98]">Enter Game</button>
</div>

<div id="quiz-area" class="w-full max-w-2xl hidden flex-col items-center">
    
    <div id="timer-container" class="hidden w-full bg-white p-4 rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-gray-100 mb-6">
        <div class="flex justify-between items-center mb-2">
            <span class="text-sm font-bold text-gray-500 uppercase tracking-wider flex items-center gap-2">
                ⏳ Time Remaining
            </span>
            <span id="time-text" class="text-xl font-black text-primary">--s</span>
        </div>
        <div class="w-full h-3 bg-gray-100 rounded-full overflow-hidden">
            <div id="timer-bar" class="h-full bg-primary timer-transition rounded-full" style="width: 100%;"></div>
        </div>
    </div>
    
    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-gray-100 w-full mb-6">
        <div id="questions-container" class="space-y-8"></div>
        <button id="submitBtn" onclick="submitQuiz()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3.5 rounded-xl mt-8 transition-all duration-200 shadow-md hover:shadow-lg active:scale-[0.98] text-lg">Submit Answers</button>
    </div>
</div>

<div class="bg-white p-6 rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-gray-100 w-full max-w-md mt-6 hidden" id="leaderboard-box">
    <h3 class="text-xl font-bold text-gray-900 mb-4 flex items-center justify-center gap-2">
        🏆 Live Leaderboard
    </h3>
    <div id="leaderboard-content" class="space-y-2"></div>
</div>

<script>
    let ws;
    let currentQuizData = [];
    let roomPin = "";
    let playerName = "";
    let timerInterval;
    let timeLeft = 60;
    let totalTime = 60; // Naya variable percentage nikalne ke liye

    async function joinRoom() {
        playerName = document.getElementById("nameInput").value.trim();
        roomPin = document.getElementById("pinInput").value.trim();

        if(!playerName || roomPin.length !== 4) return alert("Enter valid Name and PIN!");

        const btn = document.querySelector('button');
        const originalText = btn.innerText;
        btn.innerText = "Joining...";
        btn.disabled = true;

        try {
            const response = await fetch(`https://ai-quiz-generator-7eak.onrender.com/join-room/${roomPin}`);
            const data = await response.json();

            if(response.ok) {
                document.getElementById("join-section").classList.add("hidden");
                document.getElementById("quiz-area").classList.remove("hidden");
                document.getElementById("quiz-area").classList.add("flex");
                document.getElementById("leaderboard-box").classList.remove("hidden");
                
                let extractedQuiz = data.quiz;
                if (data.quiz && data.quiz.quiz) {
                    extractedQuiz = data.quiz.quiz;
                }
                
                currentQuizData = extractedQuiz;
                
                // Set total time and time left
                totalTime = data.timer_seconds || 60;
                timeLeft = totalTime;
                
                renderQuiz(currentQuizData);
                connectWebSocket(roomPin, playerName);
                startTimer();
            } else {
                alert("Room not found!");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        } catch (e) {
            console.error(e);
            alert("Connection error!");
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    function startTimer() {
        const timerContainer = document.getElementById("timer-container");
        const timeText = document.getElementById("time-text");
        const timerBar = document.getElementById("timer-bar");
        
        timerContainer.classList.remove("hidden");
        
        timerInterval = setInterval(() => {
            timeLeft--;
            timeText.innerText = timeLeft + "s";
            
            // Width calculate kar rahe hain (e.g. 30/60 = 50%)
            const widthPercentage = (timeLeft / totalTime) * 100;
            timerBar.style.width = widthPercentage + "%";
            
            // Gamified Color Logic (Jab 10 seconds bachein)
            if(timeLeft <= 10) {
                timeText.classList.remove("text-primary");
                timeText.classList.add("text-red-600", "animate-pulse");
                timerBar.classList.remove("bg-primary");
                timerBar.classList.add("bg-red-500");
            }
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                submitQuiz();
            }
        }, 1000); // Har 1 second mein update
    }

    function renderQuiz(questions) {
        let html = "";
        questions.forEach((q, i) => {
            html += `<div class="mb-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4"><span class="text-primary mr-1">Q${i+1}.</span> ${q.question}</h3>
                <div class="space-y-3">`;
            
            q.options.forEach(opt => {
                html += `
                <label class="option-card flex items-center p-4 border border-gray-200 rounded-xl cursor-pointer transition-colors duration-200 bg-gray-50">
                    <input type="radio" name="q${i}" value="${opt}" class="w-5 h-5 text-primary bg-gray-100 border-gray-300 focus:ring-primary mr-3"> 
                    <span class="text-gray-700 select-none">${opt}</span>
                </label>`;
            });
            html += `</div></div>`;
        });
        document.getElementById("questions-container").innerHTML = html;
    }

    function connectWebSocket(pin, name) {
       ws = new WebSocket(`wss://ai-quiz-generator-7eak.onrender.com/ws/${pin}/${name}`);
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if(msg.type === "leaderboard") updateLeaderboardUI(msg.data);
        };
    }

    function submitQuiz() {
        clearInterval(timerInterval);
        document.getElementById("timer-container").classList.add("hidden"); // Naye container ko hide kar rahe hain
        let score = 0;
        currentQuizData.forEach((q, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if(selected && selected.value === q.answer) score += 10;
        });
        document.getElementById("submitBtn").classList.add("hidden");
        
        document.getElementById("questions-container").innerHTML = `
            <div class="text-center py-10 animate-fade-in">
                <div class="text-6xl mb-4">🎯</div>
                <h2 class="text-3xl font-bold text-gray-900 mb-2">Quiz Completed!</h2>
                <p class="text-gray-500 mb-8">You've successfully submitted your answers.</p>
                <div class="inline-block bg-indigo-50 border border-indigo-100 rounded-2xl p-8 shadow-sm">
                    <p class="text-sm text-primary font-semibold uppercase tracking-wider mb-2">Your Final Score</p>
                    <p class="text-6xl font-black text-primary">${score}</p>
                </div>
            </div>`;
        
        ws.send(JSON.stringify({ action: "submit_score", score: score }));
    }

    function updateLeaderboardUI(data) {
        let html = "";
        const sortedPlayers = Object.entries(data).sort((a, b) => b[1] - a[1]);
        
        sortedPlayers.forEach(([user, pts], index) => {
            let medal = "";
            if(index === 0) medal = "🥇";
            else if(index === 1) medal = "🥈";
            else if(index === 2) medal = "🥉";
            else medal = `<span class="text-gray-400 font-medium w-6 inline-block text-center">${index+1}</span>`;

            const bgClass = index % 2 === 0 ? "bg-gray-50" : "bg-white";

            html += `
            <div class="flex justify-between items-center p-3.5 rounded-xl ${bgClass} transition-all">
                <div class="flex items-center gap-3">
                    <span class="text-xl">${medal}</span>
                    <span class="font-medium text-gray-800">${user}</span>
                </div>
                <span class="font-bold text-primary bg-indigo-50 px-3.5 py-1.5 rounded-full text-sm shadow-sm">${pts} pts</span>
            </div>`;
        });
        document.getElementById("leaderboard-content").innerHTML = html || "<p class='text-center text-gray-500 py-4 text-sm'>Waiting for players...</p>";
    }
</script>
</body>
</html>
